name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which agent?
      options:
        - Claude Code
        - Codex
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. npx openbar install
        2. run the agent
        3. npx openbar report
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `node --version` and `npx openbar --version`, plus your OS.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug log (optional)
      description: >
        Re-run with `OPENBAR_DEBUG=1` and paste relevant lines from
        `.openbar/openbar.log`. Redact anything sensitive.
      render: text
